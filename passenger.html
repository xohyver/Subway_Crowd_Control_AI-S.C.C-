<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.C.C — 혼잡도 안내</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .panel {
      background: #f0f0f0;
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    /* ── 역명 바 ── */
    .station-bar {
      background: #2a2a2a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .station-name-wrap { display: flex; align-items: center; gap: 12px; }

    .station-badge {
      background: #3dba6a;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      padding: 5px 12px;
      border-radius: 999px;
    }

    .station-name-ko { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: -0.5px; }
    .station-name-en { font-size: 12px; color: #aaa; margin-top: 2px; }

    .live-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #3dba6a; animation: blink 1.8s infinite; }
    .live-dot.off { background: #555; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── 현재 탑승 인원 ── */
    .center-section {
      background: #fff;
      padding: 16px 24px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #e0e0e0;
      min-height: 76px;
      transition: opacity 0.3s;
    }

    .train-svg-wrap { display: flex; align-items: center; }

    .current-count-wrap { text-align: right; }
    .current-count-label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .current-count-num {
      font-family: 'DM Mono', monospace;
      font-size: 36px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1;
      transition: color 0.5s;
    }
    .current-count-unit { font-size: 14px; color: #666; margin-left: 2px; }

    /* ── 호차 바 ── */
    .crowd-bar-section {
      background: #f0f0f0;
      padding: 20px 16px 12px;
    }

    .crowd-bar-section-label {
      font-size: 10px;
      color: #888;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .car-blocks {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      justify-content: center;
    }

    .car-block {
      flex: 1;
      border-radius: 6px 6px 4px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 8px 2px 6px;
      min-width: 0;
      transition: background 0.5s ease, outline 0.15s, transform 0.15s;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .car-block:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .car-block:active { transform: translateY(0); }

    .car-block.active {
      outline: 3px solid #1a1a1a;
      outline-offset: 2px;
      z-index: 2;
    }

    .car-block.active::after {
      content: '▼';
      position: absolute;
      top: -18px;
      font-size: 11px;
      color: #1a1a1a;
    }

    .car-block.disconnected { background: #c8c8c8 !important; }

    .car-num-label  { font-size: 11px; font-weight: 700; color: rgba(0,0,0,.55); line-height: 1; margin-bottom: 3px; }
    .car-level-label { font-size: 9px; color: rgba(0,0,0,.45); line-height: 1; }

    .lvl-comfortable  { background: #3dba6a; }
    .lvl-moderate     { background: #f5a623; }
    .lvl-crowded      { background: #e8522a; }
    .lvl-very_crowded { background: #cc1a1a; }

    /* ── 상세 배너 ── */
    .detail-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #fff;
      border-top: 2px solid #e0e0e0;
      transition: background 0.5s ease;
      min-height: 72px;
    }

    .detail-left { display: flex; align-items: center; gap: 12px; }

    .level-circle {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.5s ease;
    }

    .level-circle.gray { background: #aaa !important; }

    .detail-text-wrap .detail-level {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.3px;
      transition: color 0.4s;
    }

    .detail-text-wrap .detail-desc { font-size: 12px; color: #888; margin-top: 2px; }

    .ratio-display {
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: #1a1a1a;
      transition: color 0.4s;
    }
    .ratio-display span { font-size: 13px; color: #888; margin-left: 1px; }

    /* ── 비연결 오버레이 ── */
    .disconnected-banner {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      text-align: center;
    }

    .disconnected-banner.show { display: flex; }

    .disconnected-banner .dc-title {
      font-size: 15px;
      font-weight: 700;
      color: #888;
    }

    .disconnected-banner .dc-sub {
      font-size: 12px;
      color: #bbb;
    }

    /* ── 푸터 ── */
    .update-footer {
      background: #2a2a2a;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: #666;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div class="panel">

  <!-- 역명 바 -->
  <div class="station-bar">
    <div class="station-name-wrap">
      <div class="station-badge">S.C.C</div>
      <div>
        <div class="station-name-ko" id="station-title">1호차 혼잡도</div>
        <div class="station-name-en" id="station-sub">Car 1 — Crowd Level</div>
      </div>
    </div>
    <div class="live-wrap">
      <div class="live-dot" id="live-dot"></div>
      <span id="live-text">연결 중</span>
    </div>
  </div>

  <!-- 현재 탑승 인원 + 열차 -->
  <div class="center-section" id="center-section">
    <div class="train-svg-wrap">
      <svg width="160" height="56" viewBox="0 0 160 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="4" width="156" height="38" rx="8" fill="#e8eaf0" stroke="#c0c4d0" stroke-width="1.5"/>
        <path d="M2 12 Q2 4 10 4 L30 4 L30 42 L2 42 Z" fill="#d0d4e0" stroke="#c0c4d0" stroke-width="1"/>
        <rect x="6" y="8" width="20" height="14" rx="2" fill="#b8d4f0" stroke="#90b0d8" stroke-width="1"/>
        <circle cx="10" cy="32" r="3" fill="#fff7c0" stroke="#d0c060" stroke-width="1"/>
        <rect x="38" y="9" width="18" height="12" rx="2" fill="#c8e0f4" stroke="#90b8d8" stroke-width="0.8"/>
        <rect x="62" y="9" width="18" height="12" rx="2" fill="#c8e0f4" stroke="#90b8d8" stroke-width="0.8"/>
        <rect x="86" y="9" width="18" height="12" rx="2" fill="#c8e0f4" stroke="#90b8d8" stroke-width="0.8"/>
        <rect x="110" y="9" width="18" height="12" rx="2" fill="#c8e0f4" stroke="#90b8d8" stroke-width="0.8"/>
        <rect x="134" y="9" width="18" height="12" rx="2" fill="#c8e0f4" stroke="#90b8d8" stroke-width="0.8"/>
        <rect x="49" y="24" width="6" height="16" rx="1.5" fill="#c0c4d0"/>
        <rect x="73" y="24" width="6" height="16" rx="1.5" fill="#c0c4d0"/>
        <rect x="97" y="24" width="6" height="16" rx="1.5" fill="#c0c4d0"/>
        <rect x="121" y="24" width="6" height="16" rx="1.5" fill="#c0c4d0"/>
        <rect x="2" y="40" width="156" height="4" rx="1" fill="#b0b4c0"/>
        <circle cx="28" cy="50" r="4" fill="#888" stroke="#666" stroke-width="1"/>
        <circle cx="60" cy="50" r="4" fill="#888" stroke="#666" stroke-width="1"/>
        <circle cx="100" cy="50" r="4" fill="#888" stroke="#666" stroke-width="1"/>
        <circle cx="132" cy="50" r="4" fill="#888" stroke="#666" stroke-width="1"/>
        <rect x="0" y="54" width="160" height="2" rx="1" fill="#ccc"/>
      </svg>
    </div>
    <div class="current-count-wrap">
      <div class="current-count-label" id="count-label">현재 탑승 인원</div>
      <div class="current-count-num" id="count-big">—<span class="current-count-unit">명</span></div>
    </div>
  </div>

  <!-- 호차 바 -->
  <div class="crowd-bar-section">
    <div class="crowd-bar-section-label">호차를 선택하세요</div>
    <div class="car-blocks" id="car-blocks"></div>
  </div>

  <!-- 상세 배너 -->
  <div class="detail-banner" id="detail-banner">

    <!-- 연결된 칸 (1호차) -->
    <div class="detail-left" id="connected-detail">
      <div class="level-circle" id="level-circle">—</div>
      <div class="detail-text-wrap">
        <div class="detail-level" id="detail-level">—</div>
        <div class="detail-desc" id="detail-desc">서버 연결 대기 중</div>
      </div>
    </div>
    <div class="ratio-display" id="ratio-display">—<span>%</span></div>

    <!-- 비연결 칸 -->
    <div class="disconnected-banner" id="disconnected-detail">
      <div class="dc-title" id="dc-car-name">—호차</div>
      <div class="dc-sub">현재 연결되지 않은 칸입니다</div>
    </div>

  </div>

  <div class="update-footer">
    <span>S.C.C · Subway Crowd Control</span>
    <span id="last-update">업데이트 대기 중...</span>
  </div>

</div>

<script>
  const API = "http://localhost:5000/api/status";

  const LEVELS = {
    comfortable:  { text:"여유",      desc:"탑승하기 좋습니다",           color:"#3dba6a", short:"여유" },
    moderate:     { text:"보통",      desc:"다소 혼잡할 수 있습니다",     color:"#f5a623", short:"보통" },
    crowded:      { text:"혼잡",      desc:"탑승 시 불편할 수 있습니다",  color:"#e8522a", short:"혼잡" },
    very_crowded: { text:"매우 혼잡", desc:"다음 열차를 이용해 주세요",   color:"#cc1a1a", short:"혼잡" },
  };

  // 호차 설정 — 9호차부터 1호차 순서
  const CARS = [
    { num:9, level:"comfortable",  connected: false },
    { num:8, level:"moderate",     connected: false },
    { num:7, level:"moderate",     connected: false },
    { num:6, level:"moderate",     connected: false },
    { num:5, level:"moderate",     connected: false },
    { num:4, level:"moderate",     connected: false },
    { num:3, level:"crowded",      connected: false },
    { num:2, level:"crowded",      connected: false },
    { num:1, level:"comfortable",  connected: true  }, // 실제 연결
  ];

  let selectedCar = 1; // 기본 선택: 1호차
  let latestData = null;

  // 호차 블록 생성
  const blocksEl = document.getElementById("car-blocks");

  CARS.forEach(car => {
    const lv = LEVELS[car.level];
    const div = document.createElement("div");
    div.id = `car-block-${car.num}`;
    div.className = `car-block ${car.connected ? `lvl-${car.level}` : "disconnected"} ${car.num === 1 ? "active" : ""}`;
    div.innerHTML = `<span class="car-num-label">${car.num}</span><span class="car-level-label" id="car-label-${car.num}">${car.connected ? lv.short : "—"}</span>`;
    div.addEventListener("click", () => selectCar(car.num));
    blocksEl.appendChild(div);
  });

  function selectCar(num) {
    selectedCar = num;

    // 활성 블록 업데이트
    document.querySelectorAll(".car-block").forEach(el => el.classList.remove("active"));
    document.getElementById(`car-block-${num}`).classList.add("active");

    const car = CARS.find(c => c.num === num);

    // 제목 업데이트
    document.getElementById("station-title").textContent = `${num}호차 혼잡도`;
    document.getElementById("station-sub").textContent = `Car ${num} — Crowd Level`;

    if (car.connected) {
      // 연결된 칸: 실제 데이터 표시
      showConnected();
      if (latestData) renderDetail(latestData);
    } else {
      // 비연결 칸
      showDisconnected(num);
    }
  }

  function showConnected() {
    document.getElementById("connected-detail").style.display = "flex";
    document.getElementById("ratio-display").style.display = "block";
    document.getElementById("disconnected-detail").classList.remove("show");
    document.getElementById("count-big").style.opacity = "1";
    document.getElementById("count-label").textContent = "현재 탑승 인원";
  }

  function showDisconnected(num) {
    document.getElementById("connected-detail").style.display = "none";
    document.getElementById("ratio-display").style.display = "none";
    document.getElementById("disconnected-detail").classList.add("show");
    document.getElementById("dc-car-name").textContent = `${num}호차`;
    // 인원 표시 비움
    document.getElementById("count-big").innerHTML = `—<span class="current-count-unit">명</span>`;
    document.getElementById("count-big").style.color = "#aaa";
    document.getElementById("count-label").textContent = "탑승 인원";
  }

  function renderDetail(d) {
    if (selectedCar !== 1) return; // 1호차만 실제 데이터
    const { head_count, ratio, level, level_en, running } = d;
    const lv = LEVELS[level_en] || LEVELS.comfortable;
    const pct = Math.round(ratio * 100);

    document.getElementById("count-big").innerHTML =
      `${head_count}<span class="current-count-unit">명</span>`;
    document.getElementById("count-big").style.color = lv.color;

    // 1호차 블록 색상 실시간 반영
    const block1 = document.getElementById("car-block-1");
    block1.className = `car-block lvl-${level_en} ${selectedCar === 1 ? "active" : ""}`;
    document.getElementById("car-label-1").textContent = lv.short;

    // 배너
    const circle = document.getElementById("level-circle");
    circle.textContent = lv.short;
    circle.style.background = lv.color;
    circle.className = "level-circle";

    document.getElementById("detail-level").textContent = lv.text;
    document.getElementById("detail-level").style.color = lv.color;
    document.getElementById("detail-desc").textContent =
      running ? lv.desc : "감지가 시작되지 않았습니다";

    document.getElementById("ratio-display").innerHTML = `${pct}<span>%</span>`;
    document.getElementById("ratio-display").style.color = lv.color;
  }

  function setOnline(online) {
    document.getElementById("live-dot").className = "live-dot" + (online ? "" : " off");
    document.getElementById("live-text").textContent = online ? "실시간" : "연결 끊김";
  }

  async function fetchStatus() {
    try {
      const res = await fetch(API, { signal: AbortSignal.timeout(4000) });
      if (!res.ok) throw new Error();
      latestData = await res.json();
      renderDetail(latestData);
      setOnline(true);

      const now = new Date();
      const hms = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(n => String(n).padStart(2,"0")).join(":");
      document.getElementById("last-update").textContent = `마지막 업데이트 ${hms}`;
    } catch {
      setOnline(false);
    }
  }

  // 초기 상태
  showConnected();
  fetchStatus();
  setInterval(fetchStatus, 2000);
</script>
</body>
</html>
